name: Mobile EAS Preview

on:
  pull_request:
  push:
    branches:
      - dev

concurrency:
  group: mobile-eas-preview-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  preview:
    name: EAS Preview
    runs-on: blacksmith-8vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: write
    env:
      APP_VARIANT: preview
      NODE_OPTIONS: --max-old-space-size=8192
      MOBILE_VERSION_POLICY: fingerprint
    steps:
      - id: expo-token
        name: Check for EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is not available; skipping EAS preview."
          fi

      - name: Checkout
        if: steps.expo-token.outputs.present == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        if: steps.expo-token.outputs.present == 'true'
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Expose pnpm
        if: steps.expo-token.outputs.present == 'true'
        run: |
          pnpm_version="$(node --print "require('./package.json').packageManager.split('@').pop()")"
          vp_pnpm_bin="$HOME/.vite-plus/package_manager/pnpm/$pnpm_version/pnpm/bin"
          echo "$vp_pnpm_bin" >> "$GITHUB_PATH"
          "$vp_pnpm_bin/pnpm" --version

      - id: eas-target
        name: Resolve EAS update branch
        if: steps.expo-token.outputs.present == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            update_branch="pr-$PR_NUMBER"
            build_profile="preview:dev"
          else
            update_branch="preview"
            build_profile="preview"
          fi

          echo "branch=$update_branch" >> "$GITHUB_OUTPUT"
          echo "profile=$build_profile" >> "$GITHUB_OUTPUT"
          echo "Using EAS update branch: $update_branch"
          echo "Using EAS build profile: $build_profile"

      - name: Setup EAS
        if: steps.expo-token.outputs.present == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: pnpm

      - name: Pull preview environment variables
        if: steps.expo-token.outputs.present == 'true'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas env:pull preview --non-interactive

      - name: Deploy with fingerprint check
        if: steps.expo-token.outputs.present == 'true'
        uses: expo/expo-github-action/continuous-deploy-fingerprint@main
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        with:
          profile: ${{ steps.eas-target.outputs.profile }}
          branch: ${{ steps.eas-target.outputs.branch }}
          platform: all
          environment: preview
          working-directory: apps/mobile
          github-token: ${{ secrets.GITHUB_TOKEN }}
